apiVersion: batch/v1
kind: Job
metadata:
  name: retrieval-postgres-verify
  namespace: rag
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: verify-postgres
          image: ghcr.io/dwirefs/nemoclaw-anf/retrieval-api:dev
          command: ["sh", "-lc", "npm run verify:postgres"]
          env:
            - name: RETRIEVAL_API_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: retrieval-api-secrets
                  key: postgres-dsn
