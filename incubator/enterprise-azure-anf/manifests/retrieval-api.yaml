apiVersion: v1
kind: List
items:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: retrieval-api
      namespace: rag
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: retrieval-api
      template:
        metadata:
          labels:
            app: retrieval-api
        spec:
          containers:
            - name: retrieval-api
              image: ghcr.io/dwirefs/nemoclaw-anf/retrieval-api:dev
              env:
                - name: POSTGRES_DSN
                  valueFrom:
                    secretKeyRef:
                      name: retrieval-api-secrets
                      key: postgres-dsn
                - name: EMBEDDING_ENDPOINT
                  value: http://nemo-embedder.inference.svc.cluster.local:8000
                - name: RERANK_ENDPOINT
                  value: http://nemo-reranker.inference.svc.cluster.local:8000
  - apiVersion: v1
    kind: Service
    metadata:
      name: retrieval-api
      namespace: rag
    spec:
      selector:
        app: retrieval-api
      ports:
        - name: http
          port: 8080
          targetPort: 8080
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: retrieval-api-ingress
      namespace: rag
    spec:
      podSelector:
        matchLabels:
          app: retrieval-api
      policyTypes: [Ingress]
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  name: worker-tier
            - namespaceSelector:
                matchLabels:
                  name: ingestion
