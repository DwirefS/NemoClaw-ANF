apiVersion: v1
kind: List
items:
  - apiVersion: v1
    kind: Service
    metadata:
      name: postgres-pgvector
      namespace: database
    spec:
      clusterIP: None
      selector:
        app: postgres-pgvector
      ports:
        - name: postgres
          port: 5432
          targetPort: 5432
  - apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: postgres-pgvector
      namespace: database
    spec:
      serviceName: postgres-pgvector
      replicas: 1
      selector:
        matchLabels:
          app: postgres-pgvector
      template:
        metadata:
          labels:
            app: postgres-pgvector
        spec:
          containers:
            - name: postgres
              image: pgvector/pgvector:pg16
              ports:
                - containerPort: 5432
              env:
                - name: POSTGRES_DB
                  value: nemoclaw_rag
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-auth
                      key: username
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-auth
                      key: password
                - name: PGDATA
                  value: /var/lib/postgresql/data/pgdata
              volumeMounts:
                - name: pgdata
                  mountPath: /var/lib/postgresql/data
                - name: pgwal
                  mountPath: /var/lib/postgresql/wal
              args:
                - -c
                - shared_preload_libraries=vector
                - -c
                - wal_level=replica
                - -c
                - hnsw.ef_search=64
      volumeClaimTemplates:
        - metadata:
            name: pgdata
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: anf-postgres-rwo
            resources:
              requests:
                storage: 4Ti
        - metadata:
            name: pgwal
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: anf-postgres-rwo
            resources:
              requests:
                storage: 1Ti
