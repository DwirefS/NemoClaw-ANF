apiVersion: v1
kind: List
items:
  - apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: enterprise-agent-ingress
      namespace: edge
      annotations:
        kubernetes.io/ingress.class: azure/application-gateway
        appgw.ingress.kubernetes.io/backend-protocol: http
    spec:
      rules:
        - host: nemoclaw.enterprise.internal
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: worker-tier-gateway
                    port:
                      number: 8080
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: inference-private-only
      namespace: inference
    spec:
      podSelector: {}
      policyTypes: [Ingress, Egress]
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  name: rag
            - namespaceSelector:
                matchLabels:
                  name: guardrails
      egress:
        - to:
            - namespaceSelector:
                matchLabels:
                  name: rag
            - namespaceSelector:
                matchLabels:
                  name: guardrails
  - apiVersion: secrets-store.csi.x-k8s.io/v1
    kind: SecretProviderClass
    metadata:
      name: azure-key-vault-provider
      namespace: rag
    spec:
      provider: azure
      parameters:
        useVMManagedIdentity: "true"
        userAssignedIdentityID: "<managed-identity-client-id>"
        keyvaultName: "kv-ai-platform"
        objects: |
          array:
            - |
              objectName: retrieval-api-postgres-dsn
              objectType: secret
        tenantId: "<azure-tenant-id>"
